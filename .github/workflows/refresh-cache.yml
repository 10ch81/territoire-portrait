name: Refresh data cache

on:
  schedule:
    # 1er de chaque mois à 04:00 UTC (06:00 heure de Paris en été)
    - cron: "0 4 1 * *"
  workflow_dispatch:

concurrency:
  group: refresh-data-cache
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingestions
        run: npm run ingest:all

      - name: Commit and push cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cache/*.json

          if git diff --staged --quiet; then
            echo "Aucune modification de cache — commit ignoré."
            exit 0
          fi

          git commit -m "chore(cache): refresh public data snapshots"
          git push
