name: Analysis tests

on:
  push:
    branches: [main, master, "v2/**"]
  pull_request:
    branches: [main, master, "v2/**"]

concurrency:
  group: analysis-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Analysis unit tests
        run: npm run test:analysis
